<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RYWEER's WIKI</title>
  
  <!-- docsify 样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
  
  <!-- KaTeX 样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  
  <!-- Mermaid 核心库 -->
  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <!-- ⭐ Mermaid 样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.css">
  
  <!-- 代码高亮样式 -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.css">
  
  <!-- Favicon -->
  <link rel="icon" href="image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
  
  <!-- 公式美化样式 -->
  <style>
    /* 公式美化 */
    .katex {
      font-size: 1.15em !important;
      color: #333 !important;
    }
    .katex-display {
      margin: 1.8em 0 !important;
      padding: 12px 0 !important;
      background: #f8f9fa !important;
      border-radius: 8px !important;
      border-left: 3px solid #4CAF50 !important;
    }
    .katex-html {
      padding: 8px 12px !important;
      border-radius: 4px !important;
      background-color: #f9f9f9 !important;
      border: 1px solid #e0e0e0 !important;
    }
    
    /* ⭐ Mermaid 流程图样式 */
    .mermaid {
      text-align: center;
      margin: 30px 0;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .mermaid svg {
      max-width: 100%;
      height: auto;
    }
    
    /* 表格样式 */
    table {
      width: 100% !important;
      max-width: 100% !important;
      border-collapse: collapse !important;
      margin: 20px 0 !important;
    }
    th, td {
      padding: 12px 15px !important;
      border: 1px solid #e0e0e0 !important;
      word-wrap: break-word !important;
    }
    tbody tr:nth-child(even) {
      background-color: #fafafa !important;
    }
  </style>
</head>
<body>
  <div id="app">🚀 正在加载...</div>
  
  <!-- ========== 1. docsify 核心（最先加载） ========== -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  
  <!-- ========== 2. 配置（紧随其后） ========== -->
  <script>
    window.$docsify = {
      name: 'RYWEER\'s WIKI',
      repo: 'https://github.com/你的用户名/你的仓库',
      loadNavbar: false,
      loadSidebar: true,
      coverpage: false,
      themeColor: '#3F51B5',
      auto2top: true,
      maxLevel: 4,
      subMaxLevel: 2,
      routerMode: 'hash',
      homepage: 'README.md',
      
      executeScript: true,
      
      alias: {
        '/.*/_navbar.md': '/_navbar.md',
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      
      // ⭐ Mermaid 配置
      mermaid: {
        theme: 'default',
        options: {
          startOnLoad: true,
          flowchart: { useMaxWidth: true },
          securityLevel: 'loose'
        }
      },
      
      // KaTeX 配置（保持原样）
      katex: {
        autoRender: true,
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'a', 'img'],
        escape: false,
        trust: false,
        macros: {
          "\\RR": "\\mathbb{R}",
          "\\NN": "\\mathbb{N}",
          "\\ZZ": "\\mathbb{Z}"
        }
      },
      
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '🔍 搜索文档...',
        noData: '😔 找不到相关结果',
        depth: 4
      },
      
      copyCode: {
        buttonText: '📋 复制',
        errorText: '❌ 复制失败',
        successText: '✅ 已复制'
      }
    };
    
    // KaTeX 渲染钩子（保持原样）
    window.$docsify.plugins = [
      function(hook, vm) {
        hook.doneEach(function() {
          if (typeof renderMathInElement === 'function') {
            renderMathInElement(document.body, {
              delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\[', right: '\\]', display: true},
                {left: '\\(', right: '\\)', display: false}
              ],
              ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
              trust: false
            });
          }
        });
      }
    ];
  </script>
  
  <!-- ========== 3. KaTeX 核心 ========== -->
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  
  <!-- ========== 4. auto-render（必须） ========== -->
  <script src="//cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  
  <!-- ========== 5. docsify-katex 插件 ========== -->
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@1.1.2/dist/docsify-katex.min.js"></script>
  
  <!-- ⭐ 6. docsify-mermaid 插件（新增） ========== -->
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.min.js"></script>
  
  <!-- ========== 7. 代码高亮 ========== -->
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/prism.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  
  <!-- ========== 8. 其他插件 ========== -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
